services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${OLLAMA_CONTAINER_NAME:-ollama-server}
    restart: unless-stopped

    volumes:
      - ${OLLAMA_DATA_PATH:-./ollama_data}:/root/.ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
      - OLLAMA_ORIGIN=${OLLAMA_ORIGIN:-http://localhost:11434}
      - OLLAMA_LOG_LEVEL=${OLLAMA_LOG_LEVEL:-info}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
    networks:
      - ollama_network
    deploy:
      resources:
        limits:
          cpus: ${OLLAMA_CPU_LIMIT:-4}
          memory: ${OLLAMA_MEMORY_LIMIT:-16G}
        # Optional: GPU support (uncomment if you have NVIDIA GPU)
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ${LITELLM_CONTAINER_NAME:-litellm-proxy}
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${OLLAMA_API_KEY}

    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    depends_on:
      - ollama
    networks:
      - ollama_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G

networks:
  ollama_network:
    name: ${OLLAMA_NETWORK_NAME:-ollama_network}
    driver: bridge
