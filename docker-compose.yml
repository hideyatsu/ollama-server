services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${OLLAMA_CONTAINER_NAME:-ollama-server}
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
      - OLLAMA_ORIGIN=${OLLAMA_ORIGIN:-http://localhost:11434}
      - OLLAMA_LOG_LEVEL=${OLLAMA_LOG_LEVEL:-info}
    networks:
      - ollama_network
    # Optional: GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
    driver: local

networks:
  ollama_network:
    name: ${OLLAMA_NETWORK_NAME:-ollama_network}
    driver: bridge
